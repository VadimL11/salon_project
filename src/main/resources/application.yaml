server:
  forward-headers-strategy: framework

auth:
  dev-token:
    enabled: ${AUTH_DEV_TOKEN_ENABLED:false}

frontend:
  security:
    allowed-origin-patterns:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - https://*.up.railway.app
      - https://*.railway.app

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/salon_db
    username: salon_user
    password: salon_pass
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jackson:
    default-property-inclusion: non_null

security:
  jwt:
    # має бути довгий секрет (32+ символи)
    secret: "change-me-to-a-very-long-secret-key-32-chars-minimum!!!"

logging:
  level:
    root: INFO
    org.example.salon_project: DEBUG
